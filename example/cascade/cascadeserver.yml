# 级联服务器配置
global:
  loglevel: info
  http:
    listenaddr: :8080
    listenaddrtls: :8443
  tcp:
    listenaddr: :50050

# 级联服务器插件配置
cascadeserver:
  automigrate: true    # 自动数据库迁移
  autoregister: true   # 允许下级自动注册
  quic:
    listenaddr: :44944
  relayapi:
    secret: "server-secret-123"  # 级联API密钥

rtsp:
  enable: true

webrtc:
  port: udp:9000-9100

gb28181:
  autoinvite: true
  sip:
    listenaddr:
      - udp::5060
# 数据库配置
database:
  type: sqlite
  dsn: ./cascadeserver.db
