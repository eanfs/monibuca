global:
  loglevel: info
  http:
    listenaddr: :8081
    listenaddrtls: :18556
  tcp:
    listenaddr: :50053
  db:
    dsn: "test2.db"
    type: "sqlite"
  # S3存储配置示例（需要时取消注释并填写实际值）
  storage:
    s3:
      region: "us-east-1"                   # AWS区域
      endpoint: "storage-dev.xiding.tech"          # S3服务端点
      accessKeyID: "xidinguser"     # 访问密钥ID
      secretAccessKey: "U2FsdGVkX1/7uyvj0trCzSNFsfDZ66dMSAEZjNlvW1c=" # 秘密访问密钥
      bucket: "vidu-media-bucket"            # 存储桶名称
      pathPrefix: ""     # 文件路径前缀
      forcePathStyle: true                 # 强制路径样式（MinIO需要设为true）
      useSSL: true                          # 是否使用SSL
      timeout: "600s"                        # 上传超时时间    
rtmp:
  tcp:
    listenaddr: :19352
rtsp:
  tcp: :8555  
webrtc:
  port: udp:9200-9300  
gb28181:
  enable: false  
cluster:
  quic:
    listenaddr: :44942
  sync:
    serverid: "node2"
    address: "localhost:50053"
    seedservers:
      - "localhost:50052"
      - "localhost:50054"
    heartbeatinterval: 5s
    syncinterval: 30s
  role:
    - name: "internal"
      description: "内网角色"
      canAccess:
        - "public"
        - "relay"
      accessibleBy:
        - "internal"
        - "admin"
    - name: "public"
      description: "公网角色"
      canAccess:
        - "admin"
        - "storage"
      accessibleBy:
        - "internal"
        - "relay"
  # routing:
