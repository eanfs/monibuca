global:
  loglevel: info
  apiRoute:
    enable: true
  http:
    listenaddr: :8081
    listenaddrtls: :18551
  tcp:
    listenaddr: :50051
  db:
    dsn: "test1.db"
    type: "sqlite"
  storage:
    s3:
      region: "us-east-1"                   # AWS区域
      endpoint: "storage-dev.xiding.tech"          # S3服务端点
      accessKeyID: "xidinguser"     # 访问密钥ID
      secretAccessKey: "U2FsdGVkX1/7uyvj0trCzSNFsfDZ66dMSAEZjNlvW1c=" # 秘密访问密钥
      bucket: "vidu-media-bucket"            # 存储桶名称
      pathPrefix: "recordings"     # 文件路径前缀
      forcePathStyle: true                 # 强制路径样式（MinIO需要设为true）
      useSSL: true                          # 是否使用SSL
      timeout: "600s"                        # 上传超时时间    
rtmp:
  tcp:
    listenaddr: :19351
rtsp:
  tcp: :5541
webrtc:
  port: udp:9000-9100  
webtransport:
  listenAddr: :4431
gb28181:
  enable: false
cascadeserver:
  quic:
    listenaddr: :44941
cluster:
  quic:
    listenaddr: :44941
  sync:
    serverid: "node1"
    address: "localhost:50051"
    seedservers:
      - "localhost:50052"
      - "localhost:50053"
      - "localhost:50054"
      - "localhost:50055"
    heartbeatinterval: 5s
    syncinterval: 30s
  role:
    - name: "internal"
      description: "内网角色"
      canAccess:
        - "public"
        - "relay"
      accessibleBy:
        - "internal"
        - "admin"
    - name: "public"
      description: "公网角色"
      canAccess:
        - "admin"
        - "storage"
      accessibleBy:
        - "internal"
        - "relay"
