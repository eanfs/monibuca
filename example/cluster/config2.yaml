rtmp:
  tcp:
    listenaddr: :19352
rtsp:
  tcp: :8555  
  pull:
    live/camera101:
      url: rtsp://user:pass@192.0.2.10:554/Streaming/Channels/101
webrtc:
  port: udp:9200-9300  
webtransport:
  listenAddr: :4434
gb28181:
  enable: false  
cluster:
  quic:
    listenaddr: :44942
  sync:
    serverid: "node2"
    address: "localhost:50053"
    seedservers:
      - "localhost:50052"
      - "localhost:50054"
    heartbeatinterval: 5s
    syncinterval: 30s
  role:
    - name: "internal"
      description: "内网角色"
      canAccess:
        - "public"
        - "relay"
      accessibleBy:
        - "internal"
        - "admin"
    - name: "public"
      description: "公网角色"
      canAccess:
        - "admin"
        - "storage"
      accessibleBy:
        - "internal"
        - "relay"
