global:
  loglevel: info
  http:
    listenaddr: :8081
    listenaddrtls: :18556
  tcp:
    listenaddr: :50053
  db:
    dsn: "test2.db"
    type: "sqlite"
  # storage:
  #   s3:
  #     region: "us-east-1"
  #     endpoint: "s3.example.com"
