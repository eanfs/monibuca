global:
  loglevel: info
  http:
    listenaddr: :8082
    listenaddrtls: :18557
  tcp:
    listenaddr: :50054
  db:
    dsn: "test3.db"
    type: "sqlite"
  # storage:
  #   s3:
  #     region: "us-east-1"
