rtmp:
  tcp:
    listenaddr: :19353
rtsp:
  tcp: :8556    
gb28181:
  enable: false  
webrtc:
  port: udp:9400-9500  
webtransport:
  listenAddr: :4435
cluster:
  quic:
    listenaddr: :44943
  sync:
    serverid: "node3"
    address: "localhost:50054"
    seedservers:
      - "localhost:50052"
      - "localhost:50053"
    heartbeatinterval: 5s
    syncinterval: 30s
  role:
    - name: "internal"
      description: "内网角色"
      canAccess:
        - "public"
        - "relay"
      accessibleBy:
        - "internal"
        - "admin"
    - name: "public"
      description: "公网角色"
      canAccess:
        - "admin"
        - "storage"
      accessibleBy:
        - "internal"
        - "relay"
