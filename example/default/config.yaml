global:
  http:
    listenaddr: :8080
  location:
    "^/hdl/(.*)": "/flv/$1" # 兼容 v4
    "^/stress/api/(.*)": "/test/api/stress/$1" # 5.0.x
    "^/monitor/(.*)": "/debug/$1" # 5.0.x
  loglevel: info
  admin:
    enablelogin: false
  db:
    dbtype: sqlite  
    dsn: m7s.db
logrotate:
  path: logs              # 日志目录
  level: debug            # 将日志输出到文件，保留 debug 级别
  formatter: 2006-01-02T15  # 按小时切分
  size: 10485760          # 单文件最大约10MB
  maxfiles: 2            # 保留最近 2 个文件
  # pullproxy:
  #   - id: 1                        # 唯一ID标识，必须大于0
  #     name: "camera-1"             # 拉流代理名称
  #     type: "rtmp"                 # 拉流协议类型
  #     pull:
  #       url: "rtmp://example.com/live/stream1"  # 拉流源地址
  #     streampath: "live/camera1"   # 在Monibuca中的流路径
  #     pullonstart: true            # 是否在启动时自动开始拉流
  #     description: "前门摄像头"     # 描述信息
 
debug:
  enableTaskHistory: true #是否启用任务历史记录
srt:
  listenaddr: :6000
  # passphrase: foobarfoobar
gb28181:
  enable: true # 是否启用GB28181协议
  autoinvite: true #建议使用false，开启后会自动邀请设备推流
  mediaip: 10.10.10.8 #流媒体收流IP,外网情况下使用公网IP,内网情况下使用网卡IP,不要用127.0.0.1
  sipip: 10.10.10.8 #SIP通讯IP,不管公网还是内网都使用本机网卡IP,不要用127.0.0.1
  mediaport: "38200-38202"   #默认收流端口范围,可选
  advertise:
    routes:
      - name: lan-10
        cidr: 10.0.0.0/8
        sipip: 10.10.10.8
        mediaip: 10.10.10.8
      - name: wan
        cidr: 0.0.0.0/0
        sipip: 111.198.72.198
        mediaip: 111.198.72.198       

  sip:
    listenaddr:
      - udp::35060
  onsub:
    pull:
      ^\d{20}/\d{20}$: $0
      ^gb_\d+/(.+)$: $1
  #      .* : $0
  platforms:
    - enable: false #是否启用平台
      name: "测试平台" #平台名称
      servergbid: "34020000002000000002" #上级平台GBID
      servergbdomain: "3402000000" #上级平台GB域
      serverip: 192.168.1.106 #上级平台IP
      serverport: 5061 #上级平台端口
      devicegbid: "34020000002000000001" #本平台设备GBID
      deviceip: 192.168.1.106 #本平台设备IP
      deviceport: 5060 #本平台设备端口
      username: "34020000002000000001" #SIP账号
      password: "123456" #SIP密码
      expires: 3600 #注册有效期，单位秒
      keeptimeout: 60 #注册保持超时时间，单位秒
      civilCode: "340200" #行政区划代码
      manufacturer: "Monibuca" #设备制造商
      model: "GB28181" #设备型号
      address: "江苏南京" #设备地址
      register_way: 1
      platformchannels:
        - platformservergbid: "34020000002000000002" #上级平台GBID
          channeldbid: "34020000001110000003_34020000001320000005" #通道DBID,格式为设备ID_通道ID
