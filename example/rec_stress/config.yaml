# rec_stress config
server: http://172.16.12.52:7080

# Default record settings
record:
  filePath: record/mp4/stress
  fragment: 100s
  duration: 100s

# S3 storage used for verification (must be reachable by this program)
  
s3:
  region: "us-east-1"                   # AWS区域
  endpoint: "storage-dev.xiding.tech"          # S3服务端点
  accessKeyID: "xidinguser"     # 访问密钥ID
  secretAccessKey: "U2FsdGVkX1/7uyvj0trCzSNFsfDZ66dMSAEZjNlvW1c=" # 秘密访问密钥
  bucket: "vidu-media-bucket"            # 存储桶名称
  pathPrefix: ""     # 文件路径前缀
  forcePathStyle: true                 # 强制路径样式（MinIO需要设为true）
  useSSL: true                          # 是否使用SSL
  timeout: "30s"                        # 上传超时时间

# A list of sources to test. Each can override defaults.
sources:
