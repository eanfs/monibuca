# FLV 插件配置
flv:
  publish:
    delayclosetimeout: 3s

# HLS 插件配置
hls:
  enable: true

# WebRTC 插件配置
webrtc:
  port: udp:9000-9100

# Debug 插件配置
debug:
  enableTaskHistory: true

# 日志轮转插件
logrotate:
  enable: true
