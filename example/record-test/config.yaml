global:
  loglevel: info
  http:
    listenaddr: :8080
  admin:
    enablelogin: false
  db:
    dsn: "record-test.db"
    type: "sqlite"
  # 本地存储配置（测试阶段）
  storage:
    local:
      path: "record"  # 本地录制目录

# MP4 录制插件配置
mp4:
  enable: true
  publish:
    delayclosetimeout: 3s
  # 自动录制配置（流发布时自动开始录制）
  # onpub:
  #   record:
  #     ^live/.+:
  #         fragment: 0  # 0 表示不分片，录制完整文件
  #         filepath: record/$0  # 录制到 record/live/ 目录
  #         storage:
  #           local:
  #             path: ""

# RTSP 插件配置
rtsp:
  tcp:
    listenaddr: :554
  # 拉流配置（36 个摄像头）
  pull:
    # 海康威视 - 192.168.12.7x 系列
    live/camera1: rtsp://admin:a1234567@192.168.12.71/ch1/main/av_stream
    live/camera2: rtsp://admin:a1234567@192.168.12.72/ch1/main/av_stream
    live/camera3: rtsp://admin:a1234567@192.168.12.73/ch1/main/av_stream
