global:
  loglevel: info
  http:
    listenaddr: :8080
  admin:
    enablelogin: false
  db:
    dsn: "record-test.db"
    type: "sqlite"
  # S3存储配置示例（需要时取消注释并填写实际值）
  storage:
    # === 并发限流 ===
    # maxconcurrentuploads: 4         # 并发上传 S3/COS/OSS 槽位数（默认 4）
    # maxconcurrenttrailerwrites: 8   # [预留] trailer 写盘并发槽位 (默认 8)
    #                                 # 当前 trailer queue 是 single-threaded, 此项不影响实际行为,
    #                                 # 仅作为未来 worker-pool 实现的接口预留
    s3:
      region: "us-east-1"                   # AWS区域
      endpoint: "storage-dev.xiding.tech"          # S3服务端点
      accessKeyID: "xidinguser"     # 访问密钥ID
      secretAccessKey: "U2FsdGVkX1/7uyvj0trCzSNFsfDZ66dMSAEZjNlvW1c=" # 秘密访问密钥
      bucket: "vidu-media-bucket"            # 存储桶名称
      pathPrefix: "recordings"     # 文件路径前缀
      forcePathStyle: true                 # 强制路径样式（MinIO需要设为true）
      useSSL: true                          # 是否使用SSL
      timeout: "600s"                        # 上传超时时间
      tempDir: "record"                     # 本地临时文件目录（与local存储相同目录），为空则使用系统临时目录

# MP4 录制插件配置
mp4:
  enable: true
  publish:
    delayclosetimeout: 3s
  # 自动录制配置（流发布时自动开始录制）
  # onpub:
  #   record:
  #     ^live/.+:
  #         fragment: 0  # 0 表示不分片，录制完整文件
  #         filepath: record/$0  # 录制到 record/live/ 目录
  #         storage:
  #           local:
  #             path: ""

