project_name: m7s
archives:
  -
    files:
      - favicon.ico
builds:
  - id: "all"
    main: ./example/default/main.go
    env:
      - CGO_ENABLED=0
    tags:
      - sqlite
      - mysql
      - postgres
    ldflags:
      - -s -w -X m7s.live/v5.Version={{.Tag}}    
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - arm64
      - amd64
    hooks:
      pre:
        - go mod tidy