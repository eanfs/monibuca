syntax = "proto3";

package pb;

import "common.proto";

option go_package = "m7s.live/v5/plugin/cluster/pb";

// 获取集群状态请求
message GetClusterStatusRequest {
  string auth_token = 1;
}

// 获取集群状态响应数据
message GetClusterStatusResponseData {
  ClusterStatus status = 1;
}

// 获取集群状态响应
message GetClusterStatusResponse {
  int32 code = 1;
  string message = 2;
  GetClusterStatusResponseData data = 3;
}

// 集群状态
message ClusterStatus {
  int32 totalNodes = 1;
  int32 healthyNodes = 2;
  int32 degradedNodes = 3;
  int32 offlineNodes = 4;
  int32 totalStreams = 5;
  int32 activeStreams = 6;
  double totalBandwidthMbps = 7;
  double averageCpuUsage = 8;
  double averageMemoryUsage = 9;
  map<string, int32> nodesByRegion = 10;
  map<string, int32> nodesByRole = 11;
  repeated string managerNodes = 12;
  string electedLeader = 13;
  int64 uptimeSeconds = 14;
  string clusterState = 15;  // "normal", "degraded", "critical"
}

// 设置集群配置请求
message SetClusterConfigRequest {
  ClusterConfig config = 1;
  string auth_token = 2;
}

// 设置集群配置响应数据
message SetClusterConfigResponseData {
  bool success = 1;
}

// 设置集群配置响应
message SetClusterConfigResponse {
  int32 code = 1;
  string message = 2;
  SetClusterConfigResponseData data = 3;
}

// 集群配置
message ClusterConfig {
  LoadBalancingConfig load_balancing = 1;
  HighAvailabilityConfig high_availability = 2;
  SyncConfig sync = 3;
  MonitoringConfig monitoring = 4;
}

// 负载均衡配置
message LoadBalancingConfig {
  string strategy = 1;  // "resource-aware", "round-robin", "network-optimized"
  int32 check_interval_ms = 2;
  double rebalance_threshold = 3;
  LoadBalancingWeights weights = 4;
}

// 负载均衡权重
message LoadBalancingWeights {
  double cpu = 1;
  double memory = 2;
  double network = 3;
  double stream_count = 4;
}

// 高可用性配置
message HighAvailabilityConfig {
  int32 failover_timeout_ms = 1;  // 故障转移超时时间
  int32 heartbeat_interval_ms = 2;  // 心跳间隔时间
  int32 offline_threshold_ms = 3;  // 离线判定阈值
  bool enabled = 4;  // 是否启用高可用性
}

// 同步配置
message SyncConfig {
  int32 gossip_interval_ms = 1;
  int32 full_sync_interval_ms = 2;
  int32 sync_batch_size = 3;
}

// 监控配置
message MonitoringConfig {
  int32 metrics_interval_ms = 1;
  int32 history_retention_hours = 2;
  AlertThresholds alert_thresholds = 3;
}

// 告警阈值
message AlertThresholds {
  double cpu_percent = 1;
  double memory_percent = 2;
  double stream_failure_rate = 3;
}

// 强制负载均衡请求
message ForceLoadBalancingRequest {
  bool dry_run = 1;  // 如果为 true，只返回计划但不执行
  string auth_token = 2;
}

// 强制负载均衡响应数据
message ForceLoadBalancingResponseData {
  repeated StreamMigration planned_migrations = 1;
  int32 affected_streams = 2;
  int32 affected_nodes = 3;
}

// 强制负载均衡响应
message ForceLoadBalancingResponse {
  int32 code = 1;
  string message = 2;
  ForceLoadBalancingResponseData data = 3;
}

// 流迁移
message StreamMigration {
  string stream_path = 1;
  string source_node_id = 2;
  string target_node_id = 3;
  string reason = 4;
  double estimated_bandwidth_mbps = 5;
}

// 迁移流请求
message MigrateStreamRequest {
  string stream_path = 1;
  string target_node_id = 2;
  bool force = 3;
  string auth_token = 4;
}

// 迁移流响应数据
message MigrateStreamResponseData {
  string migration_id = 1;  // 用于跟踪迁移进度
}

// 迁移流响应
message MigrateStreamResponse {
  int32 code = 1;
  string message = 2;
  MigrateStreamResponseData data = 3;
}

// 优化资源分配请求
message OptimizeResourcesRequest {
  string resource_type = 1;  // "bandwidth", "cpu", "memory", "streams", "all"
  bool dry_run = 2;
  string auth_token = 3;
}

// 优化资源分配响应数据
message OptimizeResourcesResponseData {
  repeated StreamMigration planned_optimizations = 1;
  ResourceOptimizationStats stats = 2;
}

// 优化资源分配响应
message OptimizeResourcesResponse {
  int32 code = 1;
  string message = 2;
  OptimizeResourcesResponseData data = 3;
}

// 资源优化统计
message ResourceOptimizationStats {
  double before_average_cpu = 1;
  double after_average_cpu = 2;
  double before_average_memory = 3;
  double after_average_memory = 4;
  double before_average_bandwidth = 5;
  double after_average_bandwidth = 6;
  double before_average_streams = 7;
  double after_average_streams = 8;
  double estimated_optimization_percent = 9;
}

// 获取监控指标请求
message GetMetricsRequest {
  string metric_type = 1;  // "node", "stream", "cluster"
  string filter = 2;  // 可选，ID 或路径
  int64 start_time = 3;  // Unix timestamp in milliseconds
  int64 end_time = 4;    // Unix timestamp in milliseconds
  int32 limit = 5;
  string auth_token = 6;
}

// 获取监控指标响应数据
message GetMetricsResponseData {
  repeated MetricDataPoint data_points = 1;
}

// 获取监控指标响应
message GetMetricsResponse {
  int32 code = 1;
  string message = 2;
  GetMetricsResponseData data = 3;
}

// 指标数据点
message MetricDataPoint {
  int64 timestamp = 1;
  string metric_name = 2;
  string target_id = 3;  // 节点 ID 或流路径
  double value = 4;
  map<string, string> labels = 5;
}

// 健康检查请求
message HealthCheckRequest {
  string check_type = 1;  // "node", "stream", "service", "all"
  string target_id = 2;   // 可选，特定目标的 ID
}

// 健康检查响应数据
message HealthCheckResponseData {
  repeated HealthCheckResult results = 1;
}

// 健康检查响应
message HealthCheckResponse {
  int32 code = 1;
  string message = 2;
  HealthCheckResponseData data = 3;
}

// 健康检查结果
message HealthCheckResult {
  string check_name = 1;
  string target_id = 2;
  string status = 3;  // "healthy", "degraded", "failed"
  string message = 4;
  double value = 5;
  int64 timestamp = 6;
}

// 获取节点列表请求
message GetNodesRequest {
  string region_filter = 1;
  string role_filter = 2;
  string status_filter = 3;
}

// 获取节点列表响应数据
message GetNodesResponseData {
  repeated NodeInfo nodes = 1;
}

// 获取节点列表响应
message GetNodesResponse {
  int32 code = 1;
  string message = 2;
  GetNodesResponseData data = 3;
}

// 更新节点配置请求
message UpdateNodeConfigRequest {
  string auth_token = 1;
  string node_id = 2;
  NodeConfig config = 3;
}

// 更新节点配置响应数据
message UpdateNodeConfigResponseData {
  bool success = 1;
}

// 更新节点配置响应
message UpdateNodeConfigResponse {
  int32 code = 1;
  string message = 2;
  UpdateNodeConfigResponseData data = 3;
}

// 获取集群指标请求
message GetClusterMetricsRequest {}

// 节点指标
message NodeMetrics {
  string node_id = 1;
  string role = 2;
  string region = 3;
  string status = 4;
  bool online = 5;
  int64 last_heartbeat = 6;
  ResourceUsage resource_usage = 7;
  ResourceCapacity capacity = 8;
  int32 stream_count = 9;
}

// 流指标
message StreamMetrics {
  string stream_path = 1;
  string publisher_node_id = 2;
  string state = 3;
  int64 creation_time = 4;
  int64 last_updated = 5;
  repeated string replicated_to = 6;
  int32 subscribers = 7;
}

// 集群指标
message ClusterMetrics {
  repeated NodeMetrics node_metrics = 1;
  repeated StreamMetrics stream_metrics = 2;
}

// 获取集群指标响应数据
message GetClusterMetricsResponseData {
  ClusterMetrics metrics = 1;
}

// 获取集群指标响应
message GetClusterMetricsResponse {
  int32 code = 1;
  string message = 2;
  GetClusterMetricsResponseData data = 3;
}

// 获取集群配置请求
message GetClusterConfigRequest {}

// 获取集群配置响应数据
message GetClusterConfigResponseData {
  ClusterConfig config = 1;
}

// 获取集群配置响应
message GetClusterConfigResponse {
  int32 code = 1;
  string message = 2;
  GetClusterConfigResponseData data = 3;
}

// 更新集群配置请求
message UpdateClusterConfigRequest {
  string auth_token = 1;
  ClusterConfig config = 2;
}

// 更新集群配置响应数据
message UpdateClusterConfigResponseData {
  bool success = 1;
}

// 更新集群配置响应
message UpdateClusterConfigResponse {
  int32 code = 1;
  string message = 2;
  UpdateClusterConfigResponseData data = 3;
}

// 节点配置
message NodeConfig {
  string role = 1;
  string region = 2;
  ResourceConfig resources = 3;
}

// 资源配置
message ResourceConfig {
  int32 max_streams = 1;
  int32 max_bandwidth_mbps = 2;
  double reserve_cpu_percent = 3;
  double reserve_memory_percent = 4;
}